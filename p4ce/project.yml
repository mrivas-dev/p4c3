# Regenerate Xcode after changing targets or file layout:
#   xcodegen generate
#
# Default simulator destination (logical 402×874 pt): iPhone 17 Pro, e.g.:
#   xcodebuild -scheme P4CE -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -configuration Debug build
#
name: P4CE
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.p4ce.app

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: true

targets:
  P4CE:
    type: application
    platform: iOS
    sources:
      - path: P4CE
        excludes:
          - "*.md"
    settings:
      base:
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.p4ce.app
        PRODUCT_NAME: P4CE
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: P4CE/Info.plist
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

schemes:
  P4CE:
    build:
      targets:
        P4CE: all
